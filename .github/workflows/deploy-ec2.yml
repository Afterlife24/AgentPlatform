name: Deploy to EC2

# Deploys to the Mumbai EC2 instances whenever code lands on develop or main
# via a merged PR (i.e. a push to the branch itself, not every commit inside
# an open PR). develop -> devagents.autonomiq.ae, main -> mainagents.autonomiq.ae.
#
# Runs on a self-hosted runner installed directly on each target EC2 instance
# (see /home/ubuntu/actions-runner on each box). The runner polls GitHub
# outbound, so no inbound SSH access from GitHub's IP ranges is needed - the
# security group's "SSH from My IP only" rule stays untouched.
#
# Runs synchronously: the job blocks until `docker compose --build` finishes
# (ui rebuild can take several minutes), so pass/fail is visible in the
# Actions tab before the workflow completes.

on:
  push:
    branches:
      - develop
      - main

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, "${{ github.ref_name }}"]
    steps:
      - name: Sync repo and redeploy
        run: |
          set -euo pipefail
          cd /home/ubuntu/dograh
          git fetch origin
          git checkout ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}
          sudo docker compose --profile remote up -d --build

          # nginx resolves upstream container hostnames (api, ui, etc.) to their
          # Docker-network IPs once at startup and caches them. `up -d --build`
          # above recreates those containers with new IPs whenever their image
          # changes, so nginx is left pointing at dead IPs until it's restarted.
          # Without this, every deploy that touches api/ui leaves the site
          # returning 502s on all /api/v1/* routes until someone notices and
          # manually restarts nginx.
          sudo docker compose --profile remote restart nginx

          echo "Deployed $(git rev-parse --short HEAD) on ${{ github.ref_name }}"
