# Local-only additions on top of docker-compose.yaml.
#
# Docker Compose auto-loads this file alongside docker-compose.yaml — no -f
# flag needed. Anything here is layered on top of the base file: new services
# are added, and any key that also exists in the base file gets overridden.
#
# WHY THIS FILE EXISTS:
# docker-compose.yaml is a clean mirror of the official Dograh repo (upstream).
# We never edit it directly, so `git fetch upstream && git merge upstream/main`
# stays conflict-free. All Windows/local-only customizations live here instead,
# in a file upstream doesn't know about and will never touch.
#
# This currently adds one thing: an nginx reverse proxy on port 3000 that
# correctly routes both HTTP and WebSocket traffic to the ui/api containers.
# See LOCAL_SETUP.md for why this is needed (WebSockets don't route correctly
# through port 3010 directly).

services:
  nginx-local:
    image: nginx:alpine
    container_name: nginx_local
    depends_on:
      ui:
        condition: service_started
      api:
        condition: service_healthy
      whatsapp-adapter:
        condition: service_started
    ports:
      - "3000:80"
    volumes:
      - ./nginx-local.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network

  # Build the ui image from our fork's source instead of pulling
  # dograhai/dograh-ui:latest (the official upstream prebuilt tag). This is
  # required because we carry a local patch on top of upstream (see
  # ui/src/middleware.ts — exempts /embed from the auth redirect so the
  # public widget script isn't gated behind login). Pulling the prebuilt
  # tag would silently revert that patch on every deploy/restart, since the
  # upstream image has no knowledge of our fork's commits.
  #
  # Any deploy/CI step for this project must use `--build` (not
  # `--pull always`) so this directive actually takes effect, e.g.:
  #   docker compose --profile remote up -d --build
  # Build the api image from source so we get the public_text_chat routes
  # and any other local patches not yet in the upstream prebuilt image.
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: dograh-local/dograh-api:local
    pull_policy: never
    # Mount the local startup script and use it as the entrypoint
    # (adds --proxy-headers to uvicorn for Twilio signature validation behind nginx)
    volumes:
      - ./scripts/start_services_docker_local.sh:/app/scripts/start_services_docker_local.sh:ro
    command: ["./scripts/start_services_docker_local.sh"]

  # Same image for the ARQ worker (built once, reused)
  arq-worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: dograh-local/dograh-api:local
    pull_policy: never

  # NEXT_PUBLIC_BACKEND_URL is baked into the Next.js build at build time (it's
  # a NEXT_PUBLIC_ var, inlined into the browser JS bundle) — it can't be
  # swapped at runtime like a normal env var. Defaults to the local nginx-local
  # proxy (port 3000) for Windows/local dev, but MUST be overridden to the
  # real public URL for any remote deployment (set NEXT_PUBLIC_BACKEND_URL in
  # .env to https://<your-domain-or-sslip-host>), or every browser API call
  # silently targets a nonexistent localhost:3000 on the server and login/
  # signup appears to work but never actually authenticates (401s on every
  # subsequent call, e.g. /workflow/fetch).
  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:3000}
    image: dograh-local/dograh-ui:local
    pull_policy: never
    environment:
      NEXT_PUBLIC_BACKEND_URL: "${NEXT_PUBLIC_BACKEND_URL:-http://localhost:3000}"

  # WhatsApp adapter — Twilio WhatsApp webhooks routed via nginx at /whatsapp
  #
  # NOTE: context path casing must match the actual sibling folder name
  # exactly (../Whatsapp_Adapter). Windows filesystems are case-insensitive
  # so "../whatsapp_adapter" resolves fine locally, but this stack also runs
  # on Linux EC2 in production, where the filesystem IS case-sensitive and a
  # mismatched path fails the build outright ("path not found").
  whatsapp-adapter:
    build:
      context: ../Whatsapp_Adapter
      dockerfile: Dockerfile
    container_name: whatsapp_adapter
    environment:
      # Inside Docker, the Dograh API is reachable at http://api:8000
      DOGRAH_API_BASE: "http://api:8000/api/v1"
      DOGRAH_API_KEY: "${WHATSAPP_DOGRAH_API_KEY}"
      DOGRAH_TRIGGER_PATH: "${WHATSAPP_DOGRAH_TRIGGER_PATH}"
      TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID}"
      TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN}"
      TWILIO_WHATSAPP_NUMBER: "${TWILIO_WHATSAPP_NUMBER}"
      MONGODB_URL: "${WHATSAPP_MONGODB_URL}"
      MONGODB_DATABASE: "${WHATSAPP_MONGODB_DATABASE:-WhatsappChat24hrs}"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network
